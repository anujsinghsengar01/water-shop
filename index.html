<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Shop</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <h1>Water Shop</h1>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#products">Products</a></li>
                <li><a href="#about">About Us</a></li>
                <li><a href="#contact">Contact</a></li>
                <li><a href="#cart">Cart</a></li>
            </ul>
        </nav>
    </header>
    <section id="hero">
        <h2>Your source for clean water</h2>
        <p>Shop bottled water and purifiers</p>
        <a href="#products" class="btn">Shop Now</a>
    </section>
    <section id="products">
        <h2>Product Catalog</h2>
        <div class="product-container">
            <div class="product">
                <img src="bottled-water.jpg" alt="Bottled Water">
                <h3>Bottled Water</h3>
                <p>$1.00</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="purifier.jpg" alt="Water Purifier">
                <h3>Water Purifier</h3>
                <p>$50.00</p>
                <button>Add to Cart</button>
            </div>
            <!-- Add more products here -->
        </div>
    </section>
    <section id="cart">
        <h2>Your Cart</h2>
        <p>No items in your cart.</p>
        <button>Checkout</button>
    </section>
    <footer>
        <p>&copy; 2026 Water Shop. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
